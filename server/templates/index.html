<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>
    
    <!-- ChessboardJS CSS -->
    <link rel="stylesheet" href="/assets/css/chessboard-1.0.0.min.css">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        
        #myBoard {
            width: 500px;
            margin: 0 auto;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .info {
            margin-top: 15px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>♟️ Chess vs Stockfish ♟️</h1>
        <div id="myBoard"></div>
        
        <div class="controls">
            <button onclick="location.reload()">New Game</button>
            <button onclick="board.flip()">Flip Board</button>
        </div>
        
        <div class="info">
            You play as White vs Stockfish AI. Make your move!
        </div>
    </div>

    <!-- jQuery -->
    <script src="/assets/js/jquery-3.5.1.min.js"></script>

    <!-- Chess.js - Chess game logic -->
    <script src="/assets/js/chess.min.js"></script>

    <!-- ChessboardJS -->
    <script src="/assets/js/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();

        function onDragStart(source, piece, position, orientation) {
            // do not pick up pieces if the game is over
            if (game.game_over()) return false;

            // only pick up pieces for White
            if (piece.search(/^b/) !== -1) return false;
        }

        async function makeComputerMove() {
            // Get current FEN position
            var fen = game.fen();
            
            try {
                // Call backend API for computer move
                const response = await fetch('/api/computer-move', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ fen: fen })
                });

                const data = await response.json();
                
                if (data.error) {
                    console.log('Game over or no legal moves');
                    return;
                }

                // Update game state with the move from backend
                game.load(data.fen);
                board.position(game.fen());
                
            } catch (error) {
                console.error('Error getting computer move:', error);
            }
        }

        function onDrop(source, target) {
            // see if the move is legal
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // NOTE: always promote to a queen for example simplicity
            });

            // illegal move
            if (move === null) return 'snapback';

            // make computer move for black
            window.setTimeout(makeComputerMove, 250);
        }

        // update the board position after the piece snap
        // for castling, en passant, pawn promotion
        function onSnapEnd() {
            board.position(game.fen());
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: '/assets/chess/pieces/{piece}.png'
        };
        
        board = Chessboard('myBoard', config);
        
        // Make board responsive
        $(window).resize(function() {
            board.resize();
        });
    </script>
</body>
</html>
