<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>
    
    <!-- ChessboardJS CSS v1.0.1 -->
    <link rel="stylesheet" href="/assets/css/chessboard-1.0.1.css?v={{.CacheBuster}}">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        
        #myBoard {
            width: 500px;
            margin: 0 auto;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .info {
            margin-top: 15px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            text-align: center;
            color: #666;
        }
        
        .stats {
            margin-top: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
        }
        
        .stat-label {
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-value {
            color: #333;
        }
        
        .player-selection {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .player-selection select {
            padding: 8px 15px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 5px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .player-selection select:hover {
            border-color: #5568d3;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }
        
        .player-selection select:focus {
            outline: none;
            border-color: #5568d3;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .vs-text {
            font-weight: bold;
            color: #667eea;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>♟️ Chess Game ♟️</h1>
        <div class="player-selection">
            <select id="whitePlayer">
                <option value="human">Human</option>
                {{range .Engines}}
                <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
            <span class="vs-text">vs</span>
            <select id="blackPlayer">
                <option value="human">Human</option>
                {{range .Engines}}
                <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
        </div>
        <div id="myBoard"></div>
        
        <div class="controls">
            <button onclick="location.reload()">New Game</button>
            <button onclick="flipBoard()">Flip Board</button>
            <button id="whiteAnalysisToggle" onclick="toggleWhiteAnalysis()">White Analysis</button>
            <button id="blackAnalysisToggle" onclick="toggleBlackAnalysis()">Black Analysis</button>
        </div>
        
        <div id="whiteAnalysisInfo" class="info" style="display: none; background: #e3f2fd;">
            <strong>⚪ White Analysis:</strong> <span id="whiteAnalysisDepth">-</span> depth | 
            <span id="whiteAnalysisScore">-</span> | 
            <span id="whiteAnalysisNodes">-</span> nodes
        </div>
        
        <div id="blackAnalysisInfo" class="info" style="display: none; background: #f3e5f5;">
            <strong>⚫ Black Analysis:</strong> <span id="blackAnalysisDepth">-</span> depth | 
            <span id="blackAnalysisScore">-</span> | 
            <span id="blackAnalysisNodes">-</span> nodes
        </div>
        
        <div class="info" id="gameInfo">
            You play as White vs Stockfish AI. Make your move!
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">⚪ White Moves:</span>
                <span class="stat-value" id="whiteMoves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚫ Black Moves:</span>
                <span class="stat-value" id="blackMoves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚪ White Time:</span>
                <span class="stat-value" id="whiteTime">0s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚫ Black Time:</span>
                <span class="stat-value" id="blackTime">0s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">📊 Total Moves:</span>
                <span class="stat-value" id="totalMoves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⏱️ Game Duration:</span>
                <span class="stat-value" id="gameDuration">0s</span>
            </div>
        </div>
    </div>

    <!-- jQuery from CDN -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>

    <!-- Chess.js - Chess game logic -->
    <script src="/assets/js/chess.js?v={{.CacheBuster}}"></script>

    <!-- ChessboardJS v1.0.1 (modified with click-to-move) -->
    <script src="/assets/js/chessboard-1.0.1.js?v={{.CacheBuster}}"></script>

    <!-- Chess UI Logic -->
    <script src="/assets/js/chess-ui.js?v={{.CacheBuster}}"></script>
</body>
</html>
