<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>
    
    <!-- ChessboardJS CSS v1.0.1 -->
    <link rel="stylesheet" href="/assets/css/chessboard-1.0.1.css?v={{.CacheBuster}}">
    
    <!-- Chess UI Styles -->
    <link rel="stylesheet" href="/assets/css/chess-ui.css?v={{.CacheBuster}}">
</head>
<body>
    <div class="container">
        <h1>♟️ Chess Game ♟️</h1>
        <div class="player-selection">
            <select id="whitePlayer">
                <option value="human">Human</option>
                {{range .Engines}}
                <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
            <span class="vs-text">vs</span>
            <select id="blackPlayer">
                <option value="human">Human</option>
                {{range .Engines}}
                <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
        </div>
        <div id="myBoard"></div>
        
        <div class="controls">
            <button onclick="location.reload()">New Game</button>
            <button onclick="flipBoard()">Flip Board</button>
            <button id="whiteAnalysisToggle" onclick="toggleWhiteAnalysis()">White Analysis</button>
            <button id="blackAnalysisToggle" onclick="toggleBlackAnalysis()">Black Analysis</button>
        </div>
        
        <div id="whiteAnalysisInfo" class="info" style="display: none; background: #e3f2fd;">
            <strong>⚪ White Analysis:</strong> <span id="whiteAnalysisDepth">-</span> depth | 
            <span id="whiteAnalysisScore">-</span> | 
            <span id="whiteAnalysisNodes">-</span> nodes
        </div>
        
        <div id="blackAnalysisInfo" class="info" style="display: none; background: #f3e5f5;">
            <strong>⚫ Black Analysis:</strong> <span id="blackAnalysisDepth">-</span> depth | 
            <span id="blackAnalysisScore">-</span> | 
            <span id="blackAnalysisNodes">-</span> nodes
        </div>
        
        <div class="info" id="gameInfo">
            You play as White vs Stockfish AI. Make your move!
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">⚪ White Moves:</span>
                <span class="stat-value" id="whiteMoves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚫ Black Moves:</span>
                <span class="stat-value" id="blackMoves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚪ White Time:</span>
                <span class="stat-value" id="whiteTime">0s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚫ Black Time:</span>
                <span class="stat-value" id="blackTime">0s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">📊 Total Moves:</span>
                <span class="stat-value" id="totalMoves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⏱️ Game Duration:</span>
                <span class="stat-value" id="gameDuration">0s</span>
            </div>
        </div>
    </div>

    <!-- jQuery (local) -->
    <script src="/assets/js/jquery-3.5.1.min.js?v={{.CacheBuster}}"></script>

    <!-- Chess.js - Chess game logic -->
    <script src="/assets/js/chess.js?v={{.CacheBuster}}"></script>

    <!-- ChessboardJS v1.0.1 (modified with click-to-move) -->
    <script src="/assets/js/chessboard-1.0.1.js?v={{.CacheBuster}}"></script>

    <!-- Chess UI Logic -->
    <script src="/assets/js/chess-ui.js?v={{.CacheBuster}}"></script>
</body>
</html>
