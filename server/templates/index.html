<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>
    
    <!-- ChessboardJS CSS v1.0.1 -->
    <link rel="stylesheet" href="/assets/css/chessboard-1.0.1.css?v={{.CacheBuster}}">
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="/assets/css/codemirror.min.css?v={{.CacheBuster}}">
    
    <!-- Chess UI Styles -->
    <link rel="stylesheet" href="/assets/css/chess-ui.css?v={{.CacheBuster}}">
</head>
<body>
    <div class="container">
        <h1>♟️ Go Chess Board ♟️</h1>
        
        <!-- Main Game Area: Board + Sidebar -->
        <div class="game-layout">
            <!-- Left: Board Area -->
            <div class="board-area">
                <!-- Black Player (Top) -->
                <div class="player-info top-player">
                    <select id="blackPlayer" class="player-select">
                        <option value="human">Human</option>
                        {{range .Engines}}
                        <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                        {{end}}
                    </select>
                    <!-- Black player controls (only shown if human) -->
                    <div id="blackPlayerControls" class="player-controls" style="display: none;">
                        <button onclick="resignBlack()" style="background: #424242; color: white; padding: 8px 12px; margin-right: 4px; font-size: 14px;">Resign</button>
                        <button onclick="offerDraw()" style="background: #9e9e9e; padding: 8px 12px; font-size: 14px;">Draw</button>
                    </div>
                    <div class="clock-compact" id="blackClock">
                        <div class="clock-time" id="blackClockTime">5:00</div>
                    </div>
                </div>
                
                <div id="myBoard"></div>
                
                <!-- White Player (Bottom) -->
                <div class="player-info bottom-player">
                    <select id="whitePlayer" class="player-select">
                        <option value="human">Human</option>
                        {{range .Engines}}
                        <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                        {{end}}
                    </select>
                    <!-- White player controls (only shown if human) -->
                    <div id="whitePlayerControls" class="player-controls" style="display: none;">
                        <button onclick="resignWhite()" style="background: #ef5350; padding: 8px 12px; margin-right: 4px; font-size: 14px;">Resign</button>
                        <button onclick="offerDraw()" style="background: #9e9e9e; padding: 8px 12px; font-size: 14px;">Draw</button>
                    </div>
                    <div class="clock-compact" id="whiteClock">
                        <div class="clock-time" id="whiteClockTime">5:00</div>
                    </div>
                </div>
            </div>
            
            <!-- Right: Controls & Stats Sidebar -->
            <div class="sidebar">
                <!-- Time Control Selection -->
                <div class="time-control-selection">
                    <label for="timeControl">⏱️ Time Control:</label>
                    <select id="timeControl">
                        <option value="1+0">Bullet 1+0</option>
                        <option value="1+1">Bullet 1+1</option>
                        <option value="2+1">Bullet 2+1</option>
                        <option value="3+0">Blitz 3+0</option>
                        <option value="3+2">Blitz 3+2</option>
                        <option value="5+0">Blitz 5+0</option>
                        <option value="5+3">Blitz 5+3</option>
                        <option value="5+5" selected>Blitz 5+5</option>
                        <option value="10+0">Rapid 10+0</option>
                        <option value="10+5">Rapid 10+5</option>
                        <option value="15+10">Rapid 15+10</option>
                        <option value="30+0">Classical 30+0</option>
                        <option value="30+20">Classical 30+20</option>
                        <option value="60+0">Classical 60+0</option>
                        <option value="90+30">Classical 90+30</option>
                        <option value="0+0">Unlimited</option>
                    </select>
                </div>
                
                <div class="controls">
                    <button onclick="newGame()">New Game</button>
                    <button id="startPauseBtn" onclick="toggleClock()">▶️ Start Game</button>
                    <button onclick="flipBoard()">Flip Board</button>
                    <button id="analysisToggle" onclick="toggleAnalysis()">🔍 Start Analysis</button>
                </div>
                
                <!-- Analysis Engine Selection -->
                <div class="analysis-engine-selection">
                    <label for="analysisEngine">🔧 Analysis Engine:</label>
                    <select id="analysisEngine">
                        {{range .Engines}}
                        <option value="{{.Path}}" {{if or (eq .Name "Stockfish 16") (eq .Name "Stockfish")}}selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                
                <!-- PV Display Toggle -->
                <div class="analysis-pv-toggle">
                    <label>
                        <input type="checkbox" id="showPVArrows" checked>
                        Show principal variation (3 moves)
                    </label>
                    <span id="analysisDepth" class="analysis-depth">Depth: -</span>
                </div>
                
                <div class="info" id="gameInfo">
                    Make your move!
                </div>
                
                <!-- Opening Name Display -->
                <div class="opening-compact" id="openingDisplay" style="display: none;">
                    📖 <span id="openingText">-</span>
                </div>
                
                <div class="move-history">
                    <div class="move-history-header">
                        📜 Move History
                        <div class="move-history-buttons">
                            <button onclick="loadPGNFile()" class="history-btn" title="Load PGN from file">📂 Load PGN</button>
                            <button onclick="savePGNFile()" class="history-btn" title="Save PGN to file">💾 Save PGN</button>
                        </div>
                    </div>
                    <div class="navigation-controls">
                        <button onclick="goToStart()" class="nav-btn" title="Go to start">⏮️</button>
                        <button onclick="stepBackward()" class="nav-btn" title="Step backward">◀️</button>
                        <span id="positionIndicator" class="position-indicator">0/0</span>
                        <button onclick="stepForward()" class="nav-btn" title="Step forward">▶️</button>
                        <button onclick="goToEnd()" class="nav-btn" title="Go to end">⏭️</button>
                    </div>
                    <textarea id="moveHistoryText" class="move-history-text" placeholder="Load PGN file or play moves..."></textarea>
                    <input type="file" id="pgnFileInput" accept=".pgn" style="display: none;">
                </div>
            </div>
        </div>
    </div>

    <!-- PGN Game Selection Modal -->
    <div id="pgnGameSelectorModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📂 Select a Game from PGN File</h2>
                <span class="modal-close" onclick="closePGNGameSelector()">&times;</span>
            </div>
            <div class="modal-body">
                <p class="modal-info">This PGN file contains <strong id="gameCount">0</strong> games. Select one to analyze:</p>
                <div id="openingLoadingBar" class="opening-loading-bar" style="display: none;">
                    <div class="loading-bar-text">Loading opening names... <span id="loadingProgress">0/0</span></div>
                    <div class="loading-bar-container">
                        <div id="loadingBarFill" class="loading-bar-fill"></div>
                    </div>
                </div>
                <div class="game-table-container">
                    <table id="gameTable" class="game-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>White</th>
                                <th>Black</th>
                                <th>Result</th>
                                <th>Date</th>
                                <th>Event</th>
                                <th>Opening</th>
                            </tr>
                        </thead>
                        <tbody id="gameTableBody">
                            <!-- Games will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closePGNGameSelector()" class="modal-btn modal-btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- jQuery (local) -->
    <script src="/assets/js/jquery-3.5.1.min.js?v={{.CacheBuster}}"></script>

    <!-- Chess.js - Chess game logic -->
    <script src="/assets/js/chess.js?v={{.CacheBuster}}"></script>

    <!-- ChessboardJS v1.0.1 (modified with click-to-move) -->
    <script src="/assets/js/chessboard-1.0.1.js?v={{.CacheBuster}}"></script>

    <!-- CodeMirror -->
    <script src="/assets/js/codemirror.min.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/codemirror-chess-mode.js?v={{.CacheBuster}}"></script>

    <!-- Chess UI Logic -->
    <script src="/assets/js/chess-ui.js?v={{.CacheBuster}}"></script>
</body>
</html>
