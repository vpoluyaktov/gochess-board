<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>
    
    <!-- ChessboardJS CSS v1.0.1 -->
    <link rel="stylesheet" href="/assets/css/chessboard-1.0.1.css?v={{.CacheBuster}}">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        
        #myBoard {
            width: 500px;
            margin: 0 auto;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .info {
            margin-top: 15px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            text-align: center;
            color: #666;
        }
        
        .stats {
            margin-top: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
        }
        
        .stat-label {
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-value {
            color: #333;
        }
        
        .player-selection {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .player-selection select {
            padding: 8px 15px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 5px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .player-selection select:hover {
            border-color: #5568d3;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }
        
        .player-selection select:focus {
            outline: none;
            border-color: #5568d3;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .vs-text {
            font-weight: bold;
            color: #667eea;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>♟️ Chess Game ♟️</h1>
        <div class="player-selection">
            <select id="whitePlayer">
                <option value="human">Human</option>
                {{range .Engines}}
                <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
            <span class="vs-text">vs</span>
            <select id="blackPlayer">
                <option value="human">Human</option>
                {{range .Engines}}
                <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
        </div>
        <div id="myBoard"></div>
        
        <div class="controls">
            <button onclick="location.reload()">New Game</button>
            <button onclick="flipBoard()">Flip Board</button>
        </div>
        
        <div class="info">
            You play as White vs Stockfish AI. Make your move!
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">⚪ White Moves:</span>
                <span class="stat-value" id="whiteMoves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚫ Black Moves:</span>
                <span class="stat-value" id="blackMoves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚪ White Time:</span>
                <span class="stat-value" id="whiteTime">0s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⚫ Black Time:</span>
                <span class="stat-value" id="blackTime">0s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">📊 Total Moves:</span>
                <span class="stat-value" id="totalMoves">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⏱️ Game Duration:</span>
                <span class="stat-value" id="gameDuration">0s</span>
            </div>
        </div>
    </div>

    <!-- jQuery from CDN -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>

    <!-- Chess.js - Chess game logic -->
    <script src="/assets/js/chess.js?v={{.CacheBuster}}"></script>

    <!-- ChessboardJS v1.0.1 (modified with click-to-move) -->
    <script src="/assets/js/chessboard-1.0.1.js?v={{.CacheBuster}}"></script>

    <script>
        var board = null;
        var game = new Chess();
        var isComputerThinking = false;
        var lastMoveSquares = { from: null, to: null }; // Track last move for highlighting
        var squareClass = 'square-55d63'; // ChessboardJS square class

        // Helper functions for last move highlighting
        function clearLastMoveHighlight() {
            $('#myBoard .' + squareClass).removeClass('highlight-last-move');
        }

        function highlightLastMove(from, to) {
            clearLastMoveHighlight();
            $('#myBoard .square-' + from).addClass('highlight-last-move');
            $('#myBoard .square-' + to).addClass('highlight-last-move');
            lastMoveSquares = { from: from, to: to };
        }

        // Get current player configuration
        function getWhitePlayer() {
            return document.getElementById('whitePlayer').value;
        }

        function getBlackPlayer() {
            return document.getElementById('blackPlayer').value;
        }

        function getCurrentPlayer() {
            return game.turn() === 'w' ? getWhitePlayer() : getBlackPlayer();
        }

        function isHuman(playerValue) {
            return playerValue === 'human';
        }

        function getPlayerName(playerValue) {
            if (playerValue === 'human') return 'Human';
            const select = document.getElementById('whitePlayer');
            const option = Array.from(select.options).find(opt => opt.value === playerValue);
            return option ? option.textContent : 'Engine';
        }

        function updateInfoText() {
            const whitePlayer = getWhitePlayer();
            const blackPlayer = getBlackPlayer();
            const infoDiv = document.querySelector('.info');
            
            const whiteName = getPlayerName(whitePlayer);
            const blackName = getPlayerName(blackPlayer);
            
            if (isHuman(whitePlayer) && isHuman(blackPlayer)) {
                infoDiv.textContent = 'Human vs Human - Make your move!';
            } else if (!isHuman(whitePlayer) && !isHuman(blackPlayer)) {
                infoDiv.textContent = `${whiteName} vs ${blackName} - Watch the AI battle!`;
            } else if (isHuman(whitePlayer)) {
                infoDiv.textContent = `You play as White vs ${blackName}. Make your move!`;
            } else {
                infoDiv.textContent = `You play as Black vs ${whiteName}. Make your move!`;
            }
        }

        function onDragStart(source, piece, position, orientation) {
            // do not pick up pieces if the game is over
            if (game.game_over()) return false;

            // don't allow moves while computer is thinking
            if (isComputerThinking) return false;

            // Check if current player is human
            const currentPlayer = getCurrentPlayer();
            if (!isHuman(currentPlayer)) return false;

            // Check if the piece belongs to the current turn
            const turn = game.turn();
            if ((turn === 'w' && piece.search(/^b/) !== -1) ||
                (turn === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        async function makeComputerMove() {
            if (isComputerThinking) return;
            
            // Check if current player should be computer
            const currentPlayer = getCurrentPlayer();
            if (isHuman(currentPlayer)) return;

            // Check if game is over
            if (game.game_over()) {
                console.log('Game over');
                return;
            }

            isComputerThinking = true;
            
            // Get current FEN position
            var fen = game.fen();
            
            try {
                // Call backend API for computer move
                console.log('Making move with engine:', currentPlayer);
                const response = await fetch('/api/computer-move', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        fen: fen,
                        enginePath: currentPlayer
                    })
                });

                const data = await response.json();
                console.log('Response:', data);
                
                if (data.error) {
                    console.log('Game over or no legal moves:', data.error);
                    isComputerThinking = false;
                    return;
                }

                // Update game state with the move from backend
                console.log('Applying move:', data.move);
                
                // Extract from/to from the move (e.g., "e2e4" -> from: "e2", to: "e4")
                var moveStr = data.move;
                if (moveStr && moveStr.length >= 4) {
                    var from = moveStr.substring(0, 2);
                    var to = moveStr.substring(2, 4);
                    highlightLastMove(from, to);
                }
                
                game.load(data.fen);
                board.position(game.fen());
                
                isComputerThinking = false;
                
                // Check if next player is also computer (Stockfish vs Stockfish)
                window.setTimeout(checkForComputerMove, 250);
                
            } catch (error) {
                console.error('Error getting computer move:', error);
                isComputerThinking = false;
            }
        }

        function checkForComputerMove() {
            const currentPlayer = getCurrentPlayer();
            console.log('checkForComputerMove - currentPlayer:', currentPlayer, 'isHuman:', isHuman(currentPlayer));
            if (!isHuman(currentPlayer) && !game.game_over()) {
                makeComputerMove();
            }
        }

        function onDrop(source, target) {
            // see if the move is legal
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // NOTE: always promote to a queen for example simplicity
            });

            // illegal move
            if (move === null) return 'snapback';

            // Highlight the last move
            highlightLastMove(source, target);

            // Check if next player is computer
            window.setTimeout(checkForComputerMove, 250);
        }

        // update the board position after the piece snap
        // for castling, en passant, pawn promotion
        function onSnapEnd() {
            board.position(game.fen());
        }

        function onMoveEnd() {
            // Reapply last move highlighting after animations
            if (lastMoveSquares.from && lastMoveSquares.to) {
                $('#myBoard .square-' + lastMoveSquares.from).addClass('highlight-last-move');
                $('#myBoard .square-' + lastMoveSquares.to).addClass('highlight-last-move');
            }
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            onMoveEnd: onMoveEnd,
            pieceTheme: '/assets/chess/pieces/{piece}.png'
        };
        
        board = Chessboard('myBoard', config);
        
        // Make board responsive
        $(window).resize(function() {
            board.resize();
        });
        
        // Update stats periodically
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('whiteMoves').textContent = stats.whiteMoves;
                document.getElementById('blackMoves').textContent = stats.blackMoves;
                document.getElementById('totalMoves').textContent = stats.totalMoves;
                document.getElementById('whiteTime').textContent = stats.whiteTime;
                document.getElementById('blackTime').textContent = stats.blackTime;
                document.getElementById('gameDuration').textContent = stats.gameDuration;
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }
        
        // Update stats every second
        setInterval(updateStats, 1000);
        updateStats(); // Initial update

        // Restore player selections from localStorage
        function restorePlayerSelections() {
            const savedWhite = localStorage.getItem('whitePlayer');
            const savedBlack = localStorage.getItem('blackPlayer');
            
            const whiteSelect = document.getElementById('whitePlayer');
            const blackSelect = document.getElementById('blackPlayer');
            
            // Check if saved value exists in dropdown options
            if (savedWhite && Array.from(whiteSelect.options).some(opt => opt.value === savedWhite)) {
                whiteSelect.value = savedWhite;
            }
            if (savedBlack && Array.from(blackSelect.options).some(opt => opt.value === savedBlack)) {
                blackSelect.value = savedBlack;
            } else {
                // Default: select first engine for black if available
                const firstEngine = Array.from(blackSelect.options).find(opt => opt.value !== 'human');
                if (firstEngine) {
                    blackSelect.value = firstEngine.value;
                }
            }
        }

        // Save player selections to localStorage
        function savePlayerSelections() {
            localStorage.setItem('whitePlayer', document.getElementById('whitePlayer').value);
            localStorage.setItem('blackPlayer', document.getElementById('blackPlayer').value);
        }

        // Flip board and swap player assignments
        function flipBoard() {
            board.flip();
            
            // Swap player assignments
            const whitePlayer = document.getElementById('whitePlayer').value;
            const blackPlayer = document.getElementById('blackPlayer').value;
            
            document.getElementById('whitePlayer').value = blackPlayer;
            document.getElementById('blackPlayer').value = whitePlayer;
            
            savePlayerSelections();
            updateInfoText();
            
            // After flipping, check if computer should move
            window.setTimeout(checkForComputerMove, 250);
        }

        // Handle player selection changes
        document.getElementById('whitePlayer').addEventListener('change', function() {
            savePlayerSelections();
            updateInfoText();
            // Check if computer should move now
            window.setTimeout(checkForComputerMove, 250);
        });

        document.getElementById('blackPlayer').addEventListener('change', function() {
            savePlayerSelections();
            updateInfoText();
            // Check if computer should move now
            window.setTimeout(checkForComputerMove, 250);
        });

        // Restore selections on page load
        restorePlayerSelections();

        // Initialize info text
        updateInfoText();

        // Start computer move if White is Stockfish
        window.setTimeout(checkForComputerMove, 500);
    </script>
</body>
</html>
