<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoChess Board</title>
    
    <!-- ChessboardJS CSS v2.0.1 -->
    <link rel="stylesheet" href="/assets/css/chessboard-2.0.1.css?v={{.CacheBuster}}">
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="/assets/css/codemirror.min.css?v={{.CacheBuster}}">
    
    <!-- GoChess UI Styles -->
    <link rel="stylesheet" href="/assets/css/gochess-ui.css?v={{.CacheBuster}}">
</head>
<body>
    <!-- Debug Viewport Info (commented out) -->
    <!-- <div id="viewportDebug" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #0f0; padding: 8px 12px; font-family: monospace; font-size: 12px; border-radius: 4px; z-index: 9999; pointer-events: none;">
        Viewport: <span id="viewportSize">-</span>
    </div> -->
    
    <div class="container">
        <h1>♟️ GoChess Board ♟️</h1>
        
        <!-- Main Game Area: Three Column Layout -->
        <div class="game-layout">
            <!-- Left: Board Area -->
            <div class="board-area">
                <!-- Black Player (Top) -->
                <div class="player-info top-player">
                    <select id="blackPlayer" class="player-select">
                        <option value="human">Human</option>
                        {{range .Engines}}
                        <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                        {{end}}
                    </select>
                    <!-- Black player controls (only shown if human) -->
                    <div id="blackPlayerControls" class="player-controls" style="display: none;">
                        <button onclick="resignBlack()" class="resign-btn">Resign</button>
                        <button onclick="offerDraw()" class="draw-btn">Draw</button>
                    </div>
                    <div class="clock-compact" id="blackClock">
                        <div class="clock-time" id="blackClockTime">5:00</div>
                    </div>
                </div>
                
                <div id="myBoard"></div>
                
                <!-- White Player (Bottom) -->
                <div class="player-info bottom-player">
                    <select id="whitePlayer" class="player-select">
                        <option value="human">Human</option>
                        {{range .Engines}}
                        <option value="{{.Path}}" data-engine-id="{{.ID}}">{{.Name}}</option>
                        {{end}}
                    </select>
                    <!-- White player controls (only shown if human) -->
                    <div id="whitePlayerControls" class="player-controls" style="display: none;">
                        <button onclick="resignWhite()" class="resign-btn">Resign</button>
                        <button onclick="offerDraw()" class="draw-btn">Draw</button>
                    </div>
                    <div class="clock-compact" id="whiteClock">
                        <div class="clock-time" id="whiteClockTime">5:00</div>
                    </div>
                </div>
            </div>
            
            <!-- Center: Move History Panel -->
            <div class="move-history-panel">
                <div class="move-history">
                    <div class="move-history-header">
                        📜 Move History
                    </div>
                    <div class="navigation-controls">
                        <button onclick="goToStart()" class="nav-btn" title="To first move">⏮️</button>
                        <button onclick="stepBackward()" class="nav-btn" title="To previous move">◀️</button>
                        <button onclick="openVariation()" id="openVariationBtn" class="nav-btn" title="Open variation in new window" disabled>🔀</button>
                        <button onclick="stepForward()" class="nav-btn" title="To next move">▶️</button>
                        <button onclick="goToEnd()" class="nav-btn" title="To last move">⏭️</button>
                    </div>
                    <textarea id="moveHistoryText" class="move-history-text" placeholder="Load PGN file or play moves..."></textarea>
                    <div class="move-history-footer">
                        <button onclick="loadPGNFile()" class="history-footer-btn" title="Load PGN from file">📂 Load PGN</button>
                        <button onclick="savePGNFile()" class="history-footer-btn" title="Save PGN to file">💾 Save PGN</button>
                    </div>
                    <input type="file" id="pgnFileInput" accept=".pgn" style="display: none;">
                </div>
            </div>
            
            <!-- Right: Controls & Settings Sidebar -->
            <div class="sidebar">
                <!-- Time Control Selection -->
                <div class="time-control-selection">
                    <label for="timeControl">⏱️ Time Control:</label>
                    <select id="timeControl">
                        <option value="1+0">Bullet 1+0</option>
                        <option value="1+1">Bullet 1+1</option>
                        <option value="2+1">Bullet 2+1</option>
                        <option value="3+0">Blitz 3+0</option>
                        <option value="3+2">Blitz 3+2</option>
                        <option value="5+0">Blitz 5+0</option>
                        <option value="5+3">Blitz 5+3</option>
                        <option value="5+5" selected>Blitz 5+5</option>
                        <option value="10+0">Rapid 10+0</option>
                        <option value="10+5">Rapid 10+5</option>
                        <option value="15+10">Rapid 15+10</option>
                        <option value="30+0">Classical 30+0</option>
                        <option value="30+20">Classical 30+20</option>
                        <option value="60+0">Classical 60+0</option>
                        <option value="90+30">Classical 90+30</option>
                        <option value="0+0">Unlimited</option>
                    </select>
                </div>
                
                <!-- Move Time for Unlimited Mode -->
                <div class="move-time-selection" id="moveTimeSelection" style="display: none;">
                    <label for="moveTime">⏱️ Move Time (seconds):</label>
                    <select id="moveTime">
                        <option value="1">1 second</option>
                        <option value="3">3 seconds</option>
                        <option value="5" selected>5 seconds</option>
                        <option value="10">10 seconds</option>
                        <option value="15">15 seconds</option>
                        <option value="30">30 seconds</option>
                        <option value="60">1 minute</option>
                    </select>
                </div>
                
                <div class="controls">
                    <button onclick="newGame()">New Game</button>
                    <button id="startPauseBtn" onclick="toggleClock()">▶️ Start Game</button>
                    <button onclick="flipBoard()">Flip Board</button>
                    <button id="analysisToggle" onclick="toggleAnalysis()">🔍 Start Analysis <span id="analysisDepth" style="opacity: 0.7; font-size: 0.85em;"></span></button>
                </div>
                
                <!-- Analysis Engine Selection -->
                <div class="analysis-engine-selection">
                    <label for="analysisEngine">🔧 Analysis Engine:</label>
                    <select id="analysisEngine">
                        {{range .Engines}}
                        <option value="{{.Path}}" {{if or (eq .Name "Stockfish 16") (eq .Name "Stockfish")}}selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                
                <!-- Analysis Display Options -->
                <div class="analysis-display-options">
                    <div class="analysis-option">
                        <label>
                            <input type="radio" name="analysisDisplay" id="showBestMove" value="single" checked tabindex="-1">
                            Show the best move
                        </label>
                    </div>
                    <div class="analysis-option">
                        <label>
                            <input type="radio" name="analysisDisplay" id="showBestMoves" value="best" tabindex="-1">
                            Show 3 best moves
                        </label>
                    </div>
                    <div class="analysis-option">
                        <label>
                            <input type="radio" name="analysisDisplay" id="showPVArrows" value="pv" tabindex="-1">
                            Show principal variation
                        </label>
                    </div>
                </div>
                
                <div class="info" id="gameInfo">
                    Make your move!
                </div>
                
                <!-- Opening Name Display -->
                <div class="opening-compact" id="openingDisplay" style="display: none;">
                    📖 <span id="openingText">-</span>
                </div>
                
                <!-- Variant Controls - Aligned with History Footer -->
                <div class="variant-controls-bottom" id="variantControls">
                    <button onclick="startVariant()" id="startVariantBtn" class="variant-bottom-btn" title="Open a new window to explore a variant">🔀 Start Variant</button>
                    <div id="variantModeControls" style="display: none; margin-top: 8px;">
                        <button onclick="mergeVariant()" id="mergeVariantBtn" class="variant-bottom-btn" title="Merge this variant back to the main game">✅ Merge Variant</button>
                        <button onclick="closeVariant()" id="closeVariantBtn" class="variant-bottom-btn" title="Close this variant window">❌ Close Variant</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Dialog -->
    <div id="customDialog" class="custom-dialog" style="display: none;">
        <div class="dialog-content">
            <div class="dialog-header">
                <span id="dialogIcon" class="dialog-icon">💬</span>
            </div>
            <div class="dialog-body">
                <p id="dialogMessage" class="dialog-message"></p>
            </div>
            <div class="dialog-footer">
                <button id="dialogOkBtn" class="dialog-btn dialog-btn-ok">OK</button>
                <button id="dialogCancelBtn" class="dialog-btn dialog-btn-cancel" style="display: none;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- PGN Game Selection Modal -->
    <div id="pgnGameSelectorModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📂 Select a Game from PGN File</h2>
                <span class="modal-close" onclick="closePGNGameSelector()">&times;</span>
            </div>
            <div class="modal-body">
                <p class="modal-info">This PGN file contains <strong id="gameCount">0</strong> games. Select one to analyze:</p>
                <div id="openingLoadingBar" class="opening-loading-bar" style="display: none;">
                    <div class="loading-bar-text">Loading opening names... <span id="loadingProgress">0/0</span></div>
                    <div class="loading-bar-container">
                        <div id="loadingBarFill" class="loading-bar-fill"></div>
                    </div>
                </div>
                <div class="game-table-container">
                    <table id="gameTable" class="game-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>White</th>
                                <th>Black</th>
                                <th>Result</th>
                                <th>Date</th>
                                <th>Event</th>
                                <th>Opening</th>
                            </tr>
                        </thead>
                        <tbody id="gameTableBody">
                            <!-- Games will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closePGNGameSelector()" class="modal-btn modal-btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- jQuery (local) -->
    <script src="/assets/js/jquery-3.5.1.min.js?v={{.CacheBuster}}"></script>

    <!-- Chess.js - Chess game logic -->
    <script src="/assets/js/chess.js?v={{.CacheBuster}}"></script>

    <!-- ChessboardJS v2.0.1 (modified with click-to-move, arrows, ghost pieces, PV animation) -->
    <script src="/assets/js/chessboard-2.0.1.js?v={{.CacheBuster}}"></script>

    <!-- CodeMirror -->
    <script src="/assets/js/codemirror.min.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/codemirror-chess-mode.js?v={{.CacheBuster}}"></script>

    <!-- Chess UI Logic - Modular -->
    <script src="/assets/js/gochess-dialog.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-state.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-players.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-board.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-engine.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-clock.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-history.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-navigation.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-opening.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-analysis.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-pgn.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-variants.js?v={{.CacheBuster}}"></script>
    <script src="/assets/js/gochess-main.js?v={{.CacheBuster}}"></script>

</body>
</html>
