<!DOCTYPE html>
<html>
<head>
    <title>Opening API Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-case {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .moves {
            color: #0066cc;
            font-weight: bold;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 3px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Opening API Test</h1>
    
    <div class="test-case">
        <h3>Test Case: Evans Gambit</h3>
        <p><strong>PGN moves:</strong> <span class="moves">1.e4 e5 2.Nf3 Nc6 3.Bc4 Bc5 4.b4 Bxb4 5.c3 Bc5 6.O-O d6 7.d4 exd4 8.cxd4 Bb6</span></p>
        <p><strong>Expected:</strong> Italian Game: Evans Gambit</p>
        <button onclick="testEvansGambit()">Test Full Sequence</button>
        <button onclick="testEvansGambitShort()">Test Short (4 moves)</button>
        <button onclick="testEvansGambitMinimal()">Test Minimal (b4)</button>
        <div id="result1" class="result" style="display:none;"></div>
    </div>

    <div class="test-case">
        <h3>Extracted Moves Test</h3>
        <p>Testing move extraction from PGN format</p>
        <button onclick="testMoveExtraction()">Test Move Extraction</button>
        <div id="result2" class="result" style="display:none;"></div>
    </div>

    <script>
        async function testOpening(moves, resultId) {
            const resultDiv = document.getElementById(resultId);
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p>Testing with moves: <code>' + JSON.stringify(moves) + '</code></p><p>Loading...</p>';
            
            try {
                const response = await fetch('/api/opening', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        moves: moves
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <p><strong>✓ Success!</strong></p>
                        <p><strong>ECO:</strong> ${data.eco || 'N/A'}</p>
                        <p><strong>Name:</strong> ${data.name || 'N/A'}</p>
                        <p><strong>PGN:</strong> ${data.pgn || 'N/A'}</p>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `<p><strong>✗ Error:</strong> ${data.error || 'Unknown error'}</p>`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<p><strong>✗ Exception:</strong> ${error.message}</p>`;
            }
        }

        function testEvansGambit() {
            const moves = ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5", "b4", "Bxb4", "c3", "Bc5", "O-O", "d6", "d4", "exd4", "cxd4", "Bb6"];
            testOpening(moves, 'result1');
        }

        function testEvansGambitShort() {
            const moves = ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5", "b4"];
            testOpening(moves, 'result1');
        }

        function testEvansGambitMinimal() {
            const moves = ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5", "b4", "Bxb4"];
            testOpening(moves, 'result1');
        }

        function testMoveExtraction() {
            const resultDiv = document.getElementById('result2');
            resultDiv.style.display = 'block';
            
            const pgnText = "1.e4 e5 2.Nf3 Nc6 3.Bc4 Bc5 4.b4 Bxb4 5.c3 Bc5 6.O-O d6 7.d4 exd4 8.cxd4 Bb6";
            
            // Simulate the extraction logic
            const movesOnly = pgnText
                .replace(/\{[^}]*\}/g, '')
                .replace(/\([^)]*\)/g, '')
                .replace(/[!?]+/g, '')
                .replace(/\s*(1-0|0-1|1\/2-1\/2|\*)\s*$/, '');
            
            const moves = [];
            const tokens = movesOnly.split(/\d+\./);
            
            for (let i = 1; i < tokens.length && moves.length < 30; i++) {
                const moveText = tokens[i].trim();
                if (!moveText) continue;
                
                const moveParts = moveText.split(/\s+/);
                for (const move of moveParts) {
                    if (move && !move.match(/^[!?]+$/) && !move.match(/^\d/)) {
                        moves.push(move);
                        if (moves.length >= 30) break;
                    }
                }
            }
            
            resultDiv.className = 'result success';
            resultDiv.innerHTML = `
                <p><strong>Extracted ${moves.length} moves:</strong></p>
                <p><code>${JSON.stringify(moves)}</code></p>
                <p><strong>First 15 moves for API:</strong></p>
                <p><code>${JSON.stringify(moves.slice(0, 15))}</code></p>
                <button onclick="testOpening(${JSON.stringify(moves.slice(0, 15))}, 'result2')">Test These Moves</button>
            `;
        }
    </script>
</body>
</html>
